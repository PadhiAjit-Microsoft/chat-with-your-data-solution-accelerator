# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: chat-with-your-data-v2
metadata:
  template: chat-with-your-data-v2@0.1.0
requiredVersions:
  azd: ">= 1.18.0 != 1.23.9"

infra:
  provider: bicep
  path: infra
  module: main

hooks:
  preprovision:
    windows:
      run: |
        Write-Host ""
        Write-Host "  ---------------------------------------------------------------------------------------------------" -ForegroundColor Yellow
        Write-Host "  Note: If deployment fails or you encounter an issue, please open an issue with the deployment logs." -ForegroundColor Yellow
        Write-Host "  https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator/issues" -ForegroundColor Cyan
        Write-Host "  ---------------------------------------------------------------------------------------------------" -ForegroundColor Yellow
        Write-Host ""
      shell: pwsh
      interactive: true
    posix:
      run: |
        printf '\n'
        printf '\033[33m  ---------------------------------------------------------------------------------------------------\033[0m\n'
        printf '\033[33m  Note: If deployment fails or you encounter an issue, please open an issue with the deployment logs.\033[0m\n'
        printf '\033[36m  https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator/issues\033[0m\n'
        printf '\033[33m  ---------------------------------------------------------------------------------------------------\033[0m\n'
        printf '\n'
      shell: sh
      interactive: true
  postdeploy:
    windows:
      shell: pwsh
      run: |
        Write-Host ""
        Write-Host "=============================================="
        Write-Host " Deployment Complete - Post-Deployment Steps"
        Write-Host "=============================================="
        Write-Host ""
        Write-Host "1. Login to Azure CLI (required for post-deployment script):" -ForegroundColor Yellow
        Write-Host "   az login" -ForegroundColor Cyan
        Write-Host ""
        Write-Host "2. Run the ACR build/push/update script:" -ForegroundColor Yellow
        Write-Host "   ./infra/scripts/post-provision/acr_build_push_update.ps1 -ResourceGroupName `"$env:AZURE_RESOURCE_GROUP`"" -ForegroundColor Cyan
        Write-Host ""
        Write-Host "   Or using Bash:" -ForegroundColor Yellow
        Write-Host "   bash infra/scripts/post-provision/acr_build_push_update.sh -g `"$env:AZURE_RESOURCE_GROUP`"" -ForegroundColor Cyan
        Write-Host ""
        Write-Host "3. Run the post-deployment setup script:" -ForegroundColor Yellow
        Write-Host "   ./infra/scripts/post-provision/post_deployment_setup.ps1 -ResourceGroupName `"$env:AZURE_RESOURCE_GROUP`"" -ForegroundColor Cyan
        Write-Host ""
        Write-Host "   Or using Bash:" -ForegroundColor Yellow
        Write-Host "   bash infra/scripts/post-provision/post_deployment_setup.sh `"$env:AZURE_RESOURCE_GROUP`"" -ForegroundColor Cyan
        Write-Host ""
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: |
        echo ""
        echo "=============================================="
        echo " Deployment Complete - Post-Deployment Steps"
        echo "=============================================="
        echo ""
        echo "1. Login to Azure CLI (required for post-deployment script):"
        echo "   az login"
        echo ""
        echo "2. Run the ACR build/push/update script:"
        echo "   bash infra/scripts/post-provision/acr_build_push_update.sh -g \"$AZURE_RESOURCE_GROUP\""
        echo ""
        echo "3. Run the post-deployment setup script:"
        echo "   bash infra/scripts/post-provision/post_deployment_setup.sh \"$AZURE_RESOURCE_GROUP\""
        echo ""
      continueOnError: false
      interactive: true
